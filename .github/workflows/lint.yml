name: Lint and Format Checks

on: [push, pull_request]

jobs:
  clang-format:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-19
        run: |
          sudo apt-get install -y clang-format-19

      - name: Run clang-format check
        run: |
          find include/ src/ bindings/c/ -name '*.hpp' -o -name '*.h' -o -name '*.cpp' -o -name '*.c' | xargs clang-format-19 --dry-run --Werror

  ruff:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ruff
        run: |
          pip install ruff

      - name: Run ruff check
        run: |
          cd bindings/python && ruff check genalyzer/

      - name: Run ruff format check
        run: |
          cd bindings/python && ruff format --check genalyzer/

  ty:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install ty
        run: |
          pip install ty

      - name: Run ty check
        run: |
          cd bindings/python && ty check genalyzer/
